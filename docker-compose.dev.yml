# ============================================
# Docker Compose — Desenvolvimento
# ============================================
# Uso: docker compose -f docker-compose.dev.yml up --build
# ============================================

services:
  # ------------------------------------------
  # PostgreSQL
  # ------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: vibecheck-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: vibecheck
      POSTGRES_USER: vibecheck_user
      POSTGRES_PASSWORD: vibecheck_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibecheck_user -d vibecheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------
  # Backend — .NET 8 API
  # ------------------------------------------
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: vibecheck-backend-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=vibecheck;Username=vibecheck_user;Password=vibecheck_pass"
      DatabaseProvider: Postgres
    depends_on:
      postgres:
        condition: service_healthy

  # ------------------------------------------
  # Frontend — Vite + React
  # ------------------------------------------
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_API_TIMEOUT: "10000"
    container_name: vibecheck-frontend-dev
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data_dev:
